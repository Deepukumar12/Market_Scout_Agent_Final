version: '3.8'

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: ../../infrastructure/docker/backend.Dockerfile
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ENV=production
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./apps/worker
      dockerfile: ../../infrastructure/docker/worker.Dockerfile
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ENV=production
    depends_on:
      - db
      - redis

  admin:
    build:
      context: ./apps/admin
      dockerfile: ../../infrastructure/docker/admin.Dockerfile
    restart: always
    ports:
      - "8080:80"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: ../../infrastructure/docker/admin.Dockerfile
    restart: always
    ports:
      - "3000:80"

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
