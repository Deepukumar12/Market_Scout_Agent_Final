version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - apps/backend/.env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      - mongodb
      - redis

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    restart: always
    env_file:
      - apps/backend/.env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      - mongodb
      - redis

  admin:
    build:
      context: .
      dockerfile: infrastructure/docker/admin.Dockerfile
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data:
