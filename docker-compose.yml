version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: scoutiq-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  redis:
    image: redis:alpine
    container_name: scoutiq-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    restart: always

volumes:
  mongodb_data:
