version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: scoutiq-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always
    networks:
      - scoutiq-network

  redis:
    image: redis:alpine
    container_name: scoutiq-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    restart: always
    networks:
      - scoutiq-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: scoutiq-backend
    ports:
      - "8000:8000"
    env_file:
      - ./apps/backend/.env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_PERSIST_DIR=/app/chroma_db
    volumes:
      - ./apps/backend/chroma_db:/app/chroma_db
    depends_on:
      - mongodb
      - redis
    restart: always
    networks:
      - scoutiq-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: scoutiq-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - scoutiq-network

networks:
  scoutiq-network:
    driver: bridge

volumes:
  mongodb_data:
