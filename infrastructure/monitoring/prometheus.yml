global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'market-scout-backend'
    metrics_path: '/api/v1/meta/metrics'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'market-scout-worker'
    static_configs:
      - targets: ['worker:8001']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
